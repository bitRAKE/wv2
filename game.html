<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HyperGrid Defender</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-green: #00ff41;
            --bg-color: #050505;
            --ui-font: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            overflow: hidden;
            font-family: var(--ui-font);
            color: white;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* UI Overlay Layer */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        /* HUD */
        .hud-top {
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px var(--neon-blue);
            opacity: 0;
            transition: opacity 0.5s;
        }
        .hud-top.visible { opacity: 1; }

        /* Menus */
        .menu-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            transition: opacity 0.3s, visibility 0.3s;
            z-index: 10;
        }

        .hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        h1 {
            font-size: 64px;
            margin: 0 0 20px 0;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 4px;
            text-align: center;
        }

        p { font-size: 18px; color: #ccc; margin-bottom: 40px; text-align: center; max-width: 600px; line-height: 1.5; }

        .btn {
            background: transparent;
            color: var(--neon-blue);
            border: 2px solid var(--neon-blue);
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.2s;
            box-shadow: 0 0 10px var(--neon-blue);
            margin: 10px;
            font-family: var(--ui-font);
        }

        .btn:hover {
            background: var(--neon-blue);
            color: var(--bg-color);
            box-shadow: 0 0 30px var(--neon-blue);
            transform: scale(1.05);
        }

        .btn-secondary {
            color: var(--neon-pink);
            border-color: var(--neon-pink);
            box-shadow: 0 0 10px var(--neon-pink);
            font-size: 18px;
            padding: 10px 30px;
        }
        .btn-secondary:hover {
            background: var(--neon-pink);
            color: white;
            box-shadow: 0 0 30px var(--neon-pink);
        }

        #pause-btn {
            pointer-events: auto;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            display: none;
        }
        #pause-btn:hover { background: var(--neon-blue); color: black; }

    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="hud-top" id="hud">
            <div id="score-display">SCORE: 0</div>
            <div id="lives-display">LIVES: 3</div>
        </div>
        <div style="align-self: flex-end;">
            <div id="pause-btn">||</div>
        </div>
    </div>

    <div id="start-screen" class="menu-screen">
        <h1>HyperGrid Defender</h1>
        <p>Mouse to move. Click to launch.<br>ESC to Pause. Destroy the grid.</p>
        <button class="btn" id="start-btn">Initialize System</button>
        <button class="btn btn-secondary" id="exit-btn">Exit to Desktop</button>
    </div>

    <div id="pause-screen" class="menu-screen hidden">
        <h1>System Paused</h1>
        <button class="btn" id="resume-btn">Resume</button>
        <button class="btn btn-secondary" id="quit-btn">Quit to Menu</button>
    </div>

    <div id="gameover-screen" class="menu-screen hidden">
        <h1 id="go-title">Critical Failure</h1>
        <p id="go-score">Final Score: 0</p>
        <button class="btn" id="restart-btn">Reboot System</button>
        <button class="btn btn-secondary" id="go-exit-btn">Exit to Desktop</button>
    </div>

<script>
/**
 * HYPERGRID DEFENDER
 * Updated: Sharper bricks, expanded color palette
 */

// --- Configuration ---
const CONFIG = {
    paddleWidth: 120,
    paddleHeight: 16,
    ballRadius: 7,
    brickRows: 11,
    brickCols: 12,
    brickGap: 8,
    brickHeight: 24, // ✅ More rectangular
    // ✅ Expanded 10-color neon palette
    colors: [
        '#00f3ff', // Cyan
        '#ff00ff', // Magenta
        '#00ff41', // Green
        '#ffff00', // Yellow
        '#ff0055', // Red
        '#ff8800', // Orange
        '#aa00ff', // Purple
        '#0088ff', // Blue
        '#ff0088', // Pink
        '#00ff88'  // Mint
    ]
};

// --- State ---
const state = {
    screen: 'start',
    score: 0,
    lives: 3,
    level: 1,
    width: 0,
    height: 0,
    dpi: 1
};

// --- Audio System ---
const audio = {
    ctx: null,
    init: function() {
        if (!this.ctx) {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (this.ctx.state === 'suspended') {
            this.ctx.resume();
        }
    },
    playTone: function(freq, type, duration, vol = 0.1) {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
    },
    sfx: {
        paddle: () => audio.playTone(400, 'sine', 0.1),
        brick: () => audio.playTone(600 + Math.random()*200, 'square', 0.1, 0.05),
        wall: () => audio.playTone(200, 'triangle', 0.1),
        lose: () => {
            audio.playTone(150, 'sawtooth', 0.5);
            setTimeout(() => audio.playTone(100, 'sawtooth', 0.5), 200);
        },
        win: () => {
            [400, 500, 600, 800].forEach((f, i) => setTimeout(() => audio.playTone(f, 'sine', 0.3), i * 100));
        }
    }
};

// --- Entities ---
const paddle = { x: 0, y: 0, width: CONFIG.paddleWidth, height: CONFIG.paddleHeight };
const ball = { x: 0, y: 0, dx: 0, dy: 0, speed: 0, active: false };
let bricks = [];
let particles = [];
let shake = 0;

// --- Canvas Setup ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d', { alpha: false });

function resize() {
    state.dpi = window.devicePixelRatio || 1;
    state.width = window.innerWidth;
    state.height = window.innerHeight;
    
    canvas.style.width = state.width + 'px';
    canvas.style.height = state.height + 'px';
    canvas.width = state.width * state.dpi;
    canvas.height = state.height * state.dpi;
    
    ctx.scale(state.dpi, state.dpi);
    
    paddle.y = state.height - 50;
    if (!ball.active) {
        ball.x = paddle.x + paddle.width / 2;
        ball.y = paddle.y - CONFIG.ballRadius;
    }
}
window.addEventListener('resize', resize);

// --- Input Handling ---
function updatePaddleX(clientX) {
    paddle.x = clientX - paddle.width / 2;
    if (paddle.x < 0) paddle.x = 0;
    if (paddle.x + paddle.width > state.width) paddle.x = state.width - paddle.width;
    
    if (!ball.active) {
        ball.x = paddle.x + paddle.width / 2;
    }
}

window.addEventListener('mousemove', e => {
    if (state.screen === 'playing') updatePaddleX(e.clientX);
});
window.addEventListener('touchmove', e => {
    if (state.screen === 'playing') {
        e.preventDefault();
        updatePaddleX(e.touches[0].clientX);
    }
}, { passive: false });

window.addEventListener('mousedown', () => {
    if (state.screen === 'playing' && !ball.active) launchBall();
});
window.addEventListener('touchstart', () => {
    if (state.screen === 'playing' && !ball.active) launchBall();
}, { passive: false });

window.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
        if (state.screen === 'playing') togglePause();
        else if (state.screen === 'paused') togglePause();
    }
});

// --- Game Logic ---

function initBricks() {
    bricks = [];
    const padding = 40;
    const availableWidth = state.width - (padding * 2);
    const brickWidth = (availableWidth - (CONFIG.brickGap * (CONFIG.brickCols - 1))) / CONFIG.brickCols;

    for (let r = 0; r < CONFIG.brickRows; r++) {
        for (let c = 0; c < CONFIG.brickCols; c++) {
            bricks.push({
                x: padding + c * (brickWidth + CONFIG.brickGap),
                y: padding + r * (CONFIG.brickHeight + CONFIG.brickGap),
                w: brickWidth,
                h: CONFIG.brickHeight,
                status: 1,
                color: CONFIG.colors[r % CONFIG.colors.length]
            });
        }
    }
}

function launchBall() {
    ball.active = true;
    ball.speed = 8 + (state.level * 0.5);
    ball.dx = ball.speed * (Math.random() > 0.5 ? 1 : -1);
    ball.dy = -ball.speed;
    audio.sfx.paddle();
}

function createParticles(x, y, color) {
    for (let i = 0; i < 15; i++) {
        particles.push({
            x: x,
            y: y,
            dx: (Math.random() - 0.5) * 10,
            dy: (Math.random() - 0.5) * 10,
            life: 1.0,
            color: color
        });
    }
}

function update() {
    if (state.screen !== 'playing') return;

    if (ball.active) {
        ball.x += ball.dx;
        ball.y += ball.dy;

        if (ball.x + CONFIG.ballRadius > state.width || ball.x - CONFIG.ballRadius < 0) {
            ball.dx = -ball.dx;
            audio.sfx.wall();
            shake = 5;
        }
        if (ball.y - CONFIG.ballRadius < 0) {
            ball.dy = -ball.dy;
            audio.sfx.wall();
            shake = 5;
        }
        
        if (ball.y + CONFIG.ballRadius > paddle.y && 
            ball.y - CONFIG.ballRadius < paddle.y + paddle.height &&
            ball.x > paddle.x && ball.x < paddle.x + paddle.width) {
            
            let hitPoint = ball.x - (paddle.x + paddle.width / 2);
            hitPoint = hitPoint / (paddle.width / 2);
            
            let angle = hitPoint * (Math.PI / 3);
            let speed = Math.sqrt(ball.dx*ball.dx + ball.dy*ball.dy);
            speed = Math.min(speed * 1.05, 15); 

            ball.dx = speed * Math.sin(angle);
            ball.dy = -speed * Math.cos(angle);
            ball.y = paddle.y - CONFIG.ballRadius;
            audio.sfx.paddle();
            createParticles(ball.x, ball.y, '#fff');
        }

        let activeBricks = 0;
        for (let b of bricks) {
            if (b.status === 1) {
                activeBricks++;
                if (ball.x > b.x && ball.x < b.x + b.w && ball.y > b.y && ball.y < b.y + b.h) {
                    ball.dy = -ball.dy;
                    b.status = 0;
                    state.score += 10;
                    audio.sfx.brick();
                    createParticles(b.x + b.w/2, b.y + b.h/2, b.color);
                    shake = 3;
                    updateHUD();
                }
            }
        }

        if (activeBricks === 0) {
            state.level++;
            audio.sfx.win();
            resetLevel();
        }

        if (ball.y - CONFIG.ballRadius > state.height) {
            state.lives--;
            audio.sfx.lose();
            shake = 20;
            updateHUD();
            if (state.lives <= 0) {
                gameOver();
            } else {
                ball.active = false;
                ball.x = paddle.x + paddle.width / 2;
                ball.y = paddle.y - CONFIG.ballRadius;
            }
        }
    } else {
        ball.x = paddle.x + paddle.width / 2;
        ball.y = paddle.y - CONFIG.ballRadius;
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.dx;
        p.y += p.dy;
        p.life -= 0.02;
        if (p.life <= 0) particles.splice(i, 1);
    }

    if (shake > 0) shake *= 0.9;
    if (shake < 0.5) shake = 0;
}

function resetLevel() {
    ball.active = false;
    initBricks();
    ball.x = paddle.x + paddle.width / 2;
    ball.y = paddle.y - CONFIG.ballRadius;
}

function startGame() {
    audio.init();
    state.score = 0;
    state.lives = 3;
    state.level = 1;
    resize();
    initBricks();
    updateHUD();
    state.screen = 'playing';
    
    toggleUI('hud', false);
    toggleUI('start-screen', true);
    toggleUI('pause-screen', true);
    toggleUI('gameover-screen', true);
    
    document.getElementById('pause-btn').style.display = 'flex';
    ball.active = false;
    lockCursor();
    loop();
}

function gameOver() {
    state.screen = 'gameover';
    document.getElementById('go-score').innerText = "Final Score: " + state.score;
    
    toggleUI('gameover-screen', false);
    toggleUI('hud', true);
    toggleUI('pause-screen', true);
    toggleUI('start-screen', true);
    
    document.getElementById('pause-btn').style.display = 'none';
    unlockCursor();
}

function togglePause() {
    if (state.screen === 'playing') {
        state.screen = 'paused';
        unlockCursor();
        toggleUI('pause-screen', false);
    } else if (state.screen === 'paused') {
        state.screen = 'playing';
        lockCursor();
        toggleUI('pause-screen', true);
        loop();
    }
}

function updateHUD() {
    document.getElementById('score-display').innerText = `SCORE: ${state.score}`;
    document.getElementById('lives-display').innerText = `LIVES: ${state.lives}`;
}

function toggleUI(id, hide) {
    const el = document.getElementById(id);
    if (hide) {
        el.classList.add('hidden');
        if(id === 'hud') el.classList.remove('visible');
    } else {
        el.classList.remove('hidden');
        if(id === 'hud') el.classList.add('visible');
    }
}

// --- Rendering ---
function draw() {
    ctx.fillStyle = 'rgba(5, 5, 5, 0.3)';
    ctx.fillRect(0, 0, state.width, state.height);

    ctx.save();
    
    if (shake > 0) {
        const dx = (Math.random() - 0.5) * shake;
        const dy = (Math.random() - 0.5) * shake;
        ctx.translate(dx, dy);
    }

    // Neon Glow Mode
    ctx.shadowBlur = 0;
    ctx.globalCompositeOperation = 'lighter';

    // Draw Bricks - ✅ SHARPER EDGES
    for (let b of bricks) {
        if (b.status === 1) {
            ctx.fillStyle = b.color;
            ctx.shadowColor = b.color;
            ctx.shadowBlur = 7; // ✅ Reduced from 15 for sharper edges
            ctx.fillRect(b.x, b.y, b.w, b.h);
            
            // ✅ Subtle border for definition
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 1;
            ctx.shadowBlur = 0;
            ctx.strokeRect(b.x, b.y, b.w, b.h);
        }
    }

    // Draw Paddle
    ctx.fillStyle = CONFIG.colors[7];
    ctx.shadowColor = CONFIG.colors[7];
    ctx.shadowBlur = 11;
    ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);

    // Draw Ball
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, CONFIG.ballRadius, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 15;
    ctx.fill();
    ctx.closePath();

    // Draw Particles
    for (let p of particles) {
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.globalAlpha = p.life;
        ctx.shadowBlur = 10;
        ctx.fillRect(p.x, p.y, 4, 4);
    }
    ctx.globalAlpha = 1.0;

    // Background Grid
    ctx.shadowBlur = 0;
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = 'rgba(0, 243, 255, 0.1)';
    ctx.lineWidth = 1;
    const gridSize = 50;
    const offset = (Date.now() / 50) % gridSize;
    
    ctx.beginPath();
    for (let x = 0; x < state.width; x += gridSize) {
        ctx.moveTo(x, 0);
        ctx.lineTo(x, state.height);
    }
    for (let y = offset; y < state.height; y += gridSize) {
        ctx.moveTo(0, y);
        ctx.lineTo(state.width, y);
    }
    ctx.stroke();

    ctx.restore();
}

function loop() {
    if (state.screen === 'playing') {
        update();
        draw();
        requestAnimationFrame(loop);
    }
}

// --- Host Communication ---
function closeHost() {
    sendHostMessage('cursor_unlock');
    sendHostMessage('close');
}

function sendHostMessage(msg) {
    if (window.chrome && window.chrome.webview) {
        window.chrome.webview.postMessage(msg);
    } else {
        console.log("Host Message:", msg);
    }
}

function lockCursor() {
    sendHostMessage('cursor_lock');
}

function unlockCursor() {
    sendHostMessage('cursor_unlock');
}

// --- UI Event Listeners ---
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('resume-btn').addEventListener('click', togglePause);
document.getElementById('restart-btn').addEventListener('click', startGame);
document.getElementById('pause-btn').addEventListener('click', togglePause);
document.getElementById('quit-btn').addEventListener('click', () => {
    toggleUI('pause-screen', true);
    toggleUI('start-screen', false);
    state.screen = 'start';
    document.getElementById('pause-btn').style.display = 'none';
    unlockCursor();
});

document.getElementById('exit-btn').addEventListener('click', closeHost);
document.getElementById('go-exit-btn').addEventListener('click', closeHost);

// Initial Setup
resize();
draw();

</script>
</body>
</html>
