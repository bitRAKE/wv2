<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperGrid Defender</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            user-select: none;
        }

        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            text-shadow: 0 0 10px #0ff;
        }

        #score {
            font-size: 24px;
            font-weight: bold;
            color: #0ff;
        }

        #exit-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #f00;
            color: #f00;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 10px #f00;
            transition: all 0.2s;
            pointer-events: auto;
            z-index: 100;
        }

        #exit-btn:hover {
            background: rgba(255, 0, 0, 0.5);
            box-shadow: 0 0 20px #f00;
        }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
        }

        h1 {
            font-size: 64px;
            color: #f0f;
            text-shadow: 0 0 20px #f0f;
            margin: 0 0 20px 0;
        }

        p {
            font-size: 24px;
            color: #fff;
        }

        #restart-btn {
            margin-top: 20px;
            padding: 15px 40px;
            background: #0f0;
            border: none;
            color: #000;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px #0f0;
            pointer-events: auto;
        }

        #restart-btn:hover {
            background: #fff;
            box-shadow: 0 0 30px #0f0;
        }
    </style>
</head>

<body>
    <div id="ui">
        <div id="score">SCORE: 0</div>
    </div>
    <button id="exit-btn">Exit System</button>
    <div id="game-over">
        <h1>SYSTEM FAILURE</h1>
        <p>Final Score: <span id="final-score">0</span></p>
        <button id="restart-btn">Reboot Sequence</button>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const gameOverEl = document.getElementById('game-over');
        const finalScoreEl = document.getElementById('final-score');
        const restartBtn = document.getElementById('restart-btn');
        const exitBtn = document.getElementById('exit-btn');

        let width, height;
        let animationId;
        let lastTime = 0;
        let score = 0;
        let gameActive = true;
        let isPaused = false;

        // Entities
        const player = { x: 0, y: 0, angle: 0, size: 20, color: '#0ff' };
        let projectiles = [];
        let enemies = [];
        let particles = [];

        // Input
        const mouse = { x: 0, y: 0 };

        // Resize
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            if (!gameActive && enemies.length === 0) { // Initial Reset
                player.x = width / 2;
                player.y = height / 2;
            }
        }
        window.addEventListener('resize', resize);
        resize();
        player.x = width / 2;
        player.y = height / 2;

        // Input Handling
        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('mousedown', () => {
            if (gameActive && !isPaused) shoot();
        });

        window.addEventListener('keydown', e => {
            if (e.key === 'p' || e.key === 'P') {
                if (gameActive) isPaused = !isPaused;
            }
        });

        restartBtn.addEventListener('click', restartGame);

        exitBtn.addEventListener('click', () => {
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage('close');
            } else {
                window.close(); // Fallback for pure browser
            }
        });

        class Projectile {
            constructor(x, y, angle) {
                this.x = x;
                this.y = y;
                this.vx = Math.cos(angle) * 15;
                this.vy = Math.sin(angle) * 15;
                this.life = 100;
                this.color = '#ff0';
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        class Enemy {
            constructor() {
                // Spawn randomly on edges
                if (Math.random() < 0.5) {
                    this.x = Math.random() < 0.5 ? -20 : width + 20;
                    this.y = Math.random() * height;
                } else {
                    this.x = Math.random() * width;
                    this.y = Math.random() < 0.5 ? -20 : height + 20;
                }
                this.angle = 0;
                this.speed = 2 + Math.random() * 2;
                this.size = 15 + Math.random() * 10;
                this.color = '#f0f';
                this.spin = (Math.random() - 0.5) * 0.2;
            }
            update() {
                const dx = player.x - this.x;
                const dy = player.y - this.y;
                const dist = Math.hypot(dx, dy);
                this.angle += this.spin;
                this.x += (dx / dist) * this.speed;
                this.y += (dy / dist) * this.speed;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.strokeRect(-this.size / 2, -this.size / 2, this.size, this.size);
                ctx.restore();
                ctx.shadowBlur = 0;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1.0;
                this.decay = 0.02 + Math.random() * 0.03;
                this.color = color;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        function shoot() {
            const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
            projectiles.push(new Projectile(player.x, player.y, angle));
            // Recoil
            player.x -= Math.cos(angle) * 5;
            player.y -= Math.sin(angle) * 5;
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function restartGame() {
            enemies = [];
            projectiles = [];
            particles = [];
            score = 0;
            scoreEl.innerText = "SCORE: 0";
            gameActive = true;
            isPaused = false;
            player.x = width / 2;
            player.y = height / 2;
            gameOverEl.style.display = 'none';
        }

        function gameOver() {
            gameActive = false;
            finalScoreEl.innerText = score;
            gameOverEl.style.display = 'block';
        }

        function update(dt) {
            if (!gameActive || isPaused) return;

            // Player Angle
            player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);

            // Spawn Enemies
            if (Math.random() < 0.02 + (score * 0.0001)) {
                enemies.push(new Enemy());
            }

            // Update Projectiles
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                p.update();
                if (p.life <= 0 || p.x < 0 || p.x > width || p.y < 0 || p.y > height) {
                    projectiles.splice(i, 1);
                }
            }

            // Update Enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.update();

                // Collision with Player
                const dist = Math.hypot(player.x - e.x, player.y - e.y);
                if (dist < player.size + e.size / 2) {
                    createExplosion(player.x, player.y, '#0ff');
                    gameOver();
                }

                // Collision with Projectiles
                for (let j = projectiles.length - 1; j >= 0; j--) {
                    const p = projectiles[j];
                    const pDist = Math.hypot(p.x - e.x, p.y - e.y);
                    if (pDist < e.size / 2 + 4) {
                        createExplosion(e.x, e.y, e.color);
                        enemies.splice(i, 1);
                        projectiles.splice(j, 1);
                        score += 100;
                        scoreEl.innerText = "SCORE: " + score;
                        break;
                    }
                }
            }

            // Update Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function draw() {
            // Trail effect
            ctx.fillStyle = 'rgba(5, 5, 5, 0.2)';
            ctx.fillRect(0, 0, width, height);

            // Draw Particles
            particles.forEach(p => p.draw());

            if (gameActive) {
                // Draw Player
                ctx.save();
                ctx.translate(player.x, player.y);
                ctx.rotate(player.angle);

                ctx.strokeStyle = player.color;
                ctx.lineWidth = 2;
                ctx.shadowBlur = 20;
                ctx.shadowColor = player.color;

                ctx.beginPath();
                ctx.moveTo(15, 0);
                ctx.lineTo(-10, 10);
                ctx.lineTo(-5, 0);
                ctx.lineTo(-10, -10);
                ctx.closePath();
                ctx.stroke();

                ctx.restore();
                ctx.shadowBlur = 0;

                // Draw Projectiles
                projectiles.forEach(p => p.draw());

                // Draw Enemies
                enemies.forEach(e => e.draw());

                if (isPaused) {
                    ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
                    ctx.fillRect(0, 0, width, height);
                    ctx.fillStyle = "#fff";
                    ctx.font = "bold 48px Segoe UI";
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = "#f00";
                    ctx.fillText("PAUSED", width / 2, height / 2);
                    ctx.shadowBlur = 0;
                }
            }
        }

        function loop(timestamp) {
            const dt = timestamp - lastTime;
            lastTime = timestamp;

            update(dt);
            draw();

            animationId = requestAnimationFrame(loop);
        }

        animationId = requestAnimationFrame(loop);

    </script>
</body>

</html>
